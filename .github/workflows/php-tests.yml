name: PHP Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_sqlite
          coverage: none

      - name: Lint PHP files
        run: find . -name '*.php' -print0 | xargs -0 -n 1 php -l

      - name: Run core tests
        run: php tests/core_test.php
